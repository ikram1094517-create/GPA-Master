        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #f8fafc;
        }

#custom-splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #2c3e50;   
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000; 
    transition: opacity 0.5s ease, visibility 0.5s;
}

.splash-content {
    text-align: center;
    color: white;
}

.logo {
    font-size: 80px;
    margin-bottom: 10px;
    animation: bounce 2s infinite;
}

.app-name {
    font-size: 2.5em;
    margin: 0;
    color: #e67e22; 
}

.dev-name {
    font-size: 1em;
    opacity: 0.8;
    margin-top: 5px;
}

.loader-bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin: 20px auto;
    overflow: hidden;
}

.progress {
    width: 0%;
    height: 100%;
    background: #e67e22;
    animation: load 2s forwards;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes load {
    to { width: 100%; }
}


.splash-hidden {
    opacity: 0;
    visibility: hidden;
}


        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            color: var(--text); 
            transition: 0.3s; 
        }

        .lang-switcher { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; max-width: 450px; margin: 0 auto 10px auto; }
        
        .lang-btn { 
            background: var(--card-bg); 
            border: 1px solid #ddd; 
            padding: 5px 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.8em; 
            font-weight: bold; 
            transition: 0.3s; 
            color: var(--text);
        }
        
        .lang-btn:hover { background: var(--accent); color: white; }

        .container { 
            max-width: 450px; margin: 0 auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; 
            transition: 0.3s;
        }

        input, select { 
            width: 100%; padding: 14px; margin: 12px 0; 
            border: 1px solid #ddd; border-radius: 12px; 
            box-sizing: border-box; text-align: center; 
            font-size: 15px; transition: 0.3s; 
            background: var(--card-bg); 
            color: var(--text);
        }


        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; font-size: 1em; }
        .btn-start { background: var(--accent); color: white; }
        .btn-calc { background: var(--primary); color: white; margin-top: 20px; }
        .btn-reset { background: none; color: #7f8c8d; text-decoration: underline; font-size: 0.9em; cursor: pointer; }
        
        .card { 
            border: 1px solid rgba(0,0,0,0.05); 
            padding: 15px; 
            border-radius: 18px; 
            margin-bottom: 15px; 
            background: var(--card-bg); 
            text-align: initial; 
            transition: 0.3s;
        }

        .card-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 12px; font-size: 0.85em; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .input-box { display: flex; flex-direction: column; align-items: center; }
        .input-box label { font-size: 0.7em; color: #888; margin-bottom: 5px; font-weight: bold; }
        .input-box input { padding: 8px; border-radius: 8px; font-size: 14px; background: rgba(0,0,0,0.02); }
        
        #res-box { display: none; margin-top: 25px; padding: 20px; border-radius: 20px; transition: 0.5s; }
        .pass { border: 3px solid var(--success); background: rgba(39, 174, 96, 0.1); color: var(--success); }
        .fail { border: 3px solid var(--danger); background: rgba(231, 76, 60, 0.1); color: var(--danger); }
        #avg { font-size: 3em; font-weight: bold; display: block; }
        .badge { background: #fdf2e9; color: #e67e22; padding: 3px 8px; border-radius: 6px; }
        .dev-credit { margin-top: 20px; font-size: 0.85em; color: #7f8c8d; font-weight: 600; }
        input:disabled { background: #eee; cursor: not-allowed; border: 1px dashed #ccc; }
        [dir="rtl"] .grid { direction: ltr; }
    </style>

let detectedUniversity = "University of Algeria"; 

function getStudentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(success, error);
    }
}

function success(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;


    if (lat >= 31.0 && lat <= 33.0) {
        detectedUniversity = "University of Kasdi Merbah Ouargla 📍";
    } else {
        detectedUniversity = "University of Algeria";
    }
    
    document.getElementById("txt-subtitle").innerText = detectedUniversity;
}

function error() {
    detectedUniversity = "University of Algeria";
    document.getElementById("txt-subtitle").innerText = detectedUniversity;
}







function updateYearOptions() {
    const major = document.getElementById('userMajor').value;
    const yearSelect = document.getElementById('userYear');
    yearSelect.innerHTML = '';
    
    if (majorGroups[major]) {
        majorGroups[major].forEach(key => {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = translations[currentLang].years[key];
            yearSelect.appendChild(opt);
        });
    }
}

function setLanguage(lang) {    
    currentLang = lang;    
    const t = translations[lang]; 
    
    document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';    
    
    document.getElementById('txt-title').innerText = t.title;      
    document.getElementById('txt-subtitle').innerText = t.subtitle;     
    document.getElementById('userName').placeholder = t.placeholder;    
    document.getElementById('btn-login').innerText = t.login;       
    document.getElementById('txt-welcome').innerText = t.welcome;    
    document.getElementById('txt-final-avg').innerText = t.finalAvg;     
    document.getElementById('btn-calculate').innerText = t.calculate;    
    document.getElementById('btn-back').innerText = t.back;    
    document.getElementById('opt-s1').innerText = t.s1;    
    document.getElementById('opt-s2').innerText = t.s2;    

    if(document.getElementById('txt-edit-title')) {
        document.getElementById('txt-edit-title').innerText = t.editTitle;
    }

   
    updateYearOptions(); 
}


function startApp() {    
    getStudentLocation(); 
    

    const uName = document.getElementById('userName').value.trim();    
    if(!uName) return alert(currentLang === 'ar' ? "يرجى كتابة الاسم" : "Please enter your name");    
    const yearBase = document.getElementById('userYear').value;    
    const semBase = document.getElementById('userSemester').value;    
    finalSelectedYearKey = yearBase + "_" + semBase;    



    
    currentSubjects = JSON.parse(JSON.stringify(allData[finalSelectedYearKey] || []));

    document.getElementById('login').style.display = 'none';    
    document.getElementById('app').style.display = 'block';    
    document.getElementById('displayName').innerText = uName;    
    const yearText = document.getElementById('userYear').options[document.getElementById('userYear').selectedIndex].text;    
    const semText = document.getElementById('userSemester').options[document.getElementById('userSemester').selectedIndex].text;    
    document.getElementById('yearLabel').innerText = yearText + " - " + semText;    
    render();    
}

function render() {    
    const list = document.getElementById('list');    
    list.innerHTML = '';    
    currentSubjects.forEach((s, i) => {    
        list.innerHTML += `<div class="card">    
            <div class="card-info" style="align-items: center;">
                <input type="text" value="${s.n}" onchange="currentSubjects[${i}].n = this.value" style="margin:0; width: 60%; border:none; background:transparent; font-weight:bold; text-align:initial; padding:0; color:var(--text);">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="badge">C: <input type="number" value="${s.c}" onchange="currentSubjects[${i}].c = parseFloat(this.value)" style="width:20px; border:none; background:none; color:inherit; font-weight:bold; padding:0; text-align:center;"></span>
                    <button onclick="removeSubject(${i})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.2em; padding:0;">🗑️</button>
                </div>
            </div>    
            <div class="grid">    
                <div class="input-box"><label>TD</label><input type="number" step="0.01" id="td${i}" ${!s.td?'disabled placeholder="-"':''}></div>    
                <div class="input-box"><label>TP</label><input type="number" step="0.01" id="tp${i}" ${!s.tp?'disabled placeholder="-"':''}></div>    
                <div class="input-box"><label>Exam</label><input type="number" step="0.01" id="ex${i}" placeholder="00"></div>    
            </div>    
        </div>`;    
    });    
}


              function calculate() {    
    const subjects = currentSubjects; 
    if(!subjects || subjects.length === 0) return;    
    
    let totalPts = 0, totalC = 0;    
    subjects.forEach((s, i) => {    
        let td = parseFloat(document.getElementById(`td${i}`).value) || 0;    
        let tp = parseFloat(document.getElementById(`tp${i}`).value) || 0;    
        let ex = parseFloat(document.getElementById(`ex${i}`).value) || 0;    
        
        let note = (s.td && s.tp) ? (td*0.2 + tp*0.2 + ex*0.6) : (s.td ? td*0.4+ex*0.6 : (s.tp ? tp*0.4+ex*0.6 : ex));    
        
        totalPts += note * s.c; 
        totalC += s.c;    
    });    

    const res = (totalPts / totalC).toFixed(2);    
    const resBox = document.getElementById('res-box');    
    document.getElementById('avg').innerText = res;    
    resBox.style.display = 'block';    
    
    const name = document.getElementById('displayName').innerText;    
    if(res >= 10) {    
        resBox.className = 'pass';    
        document.getElementById('quote').innerText = translations[currentLang].pass.replace('{name}', name);    
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });    
    } else {    
        resBox.className = 'fail';    
        document.getElementById('quote').innerText = translations[currentLang].fail.replace('{name}', name);    
    }    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });    
}
  
function goBack() {    
    document.getElementById('app').style.display = 'none';    
    document.getElementById('login').style.display = 'block';    document.getElementById('res-box').style.display = 'none';    
}    

function toggleDarkMode() {
    const body = document.body;
    body.classList.toggle('dark-mode');
    
    const btn = document.getElementById('dark-btn');
    const isDark = body.classList.contains('dark-mode');
    
    
    if (isDark) {
        btn.innerText = '☀️';
    } else {
        btn.innerText = '🌙 ';
    }
    
    
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}


if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');

    const btn = document.getElementById('dark-btn');
if(btn){
btn.innerText = '☀️ Light Mode';
}
}



function addNewSubject() {
    const name = document.getElementById('new-subject-name').value;
    const coef = parseFloat(document.getElementById('new-subject-coef').value);
    const hasTd = document.getElementById('new-subject-td').checked;
    const hasTp = document.getElementById('new-subject-tp').checked;

    if (!name || isNaN(coef)) {
        alert(currentLang === 'ar' ? "يرجى إدخال اسم المادة والمعامل" : "Please enter subject name and coefficient");
        return;
    }

    
    currentSubjects.push({
        n: name,
        c: coef,
        td: hasTd,
        tp: hasTp
    });

   
    document.getElementById('new-subject-name').value = '';
    document.getElementById('new-subject-coef').value = '';
    document.getElementById('new-subject-td').checked = false;
    document.getElementById('new-subject-tp').checked = false;

    render(); 
}


function removeSubject(index) {
    currentSubjects.splice(index, 1);
    render();
}
